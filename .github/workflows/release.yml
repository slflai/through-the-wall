name: Build macOS release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Set up Python venv and deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pyinstaller Pillow dmgbuild

      - name: Generate app icon
        run: .venv/bin/python scripts/make_icon.py

      - name: Build .app bundle
        run: .venv/bin/pyinstaller ThroughTheWall.spec --noconfirm

      - name: Ad-hoc sign .app
        run: |
          xattr -cr "dist/Through the Wall.app"
          codesign --force --deep --sign - "dist/Through the Wall.app"

      - name: Build DMG
        run: ./make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Through-the-Wall-dmg
          path: dist/Through the Wall.dmg
          retention-days: 30

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Through the Wall.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
